<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxor — Products</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #161616;
  --surface3: #1c1c1c;
  --border: rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.14);
  --text: #f0f0f0;
  --muted: #666;
  --muted2: #444;
  --accent: #e8e8e8;
  --accent-glow: rgba(255,255,255,0.06);
  --nav-bg: rgba(8,8,8,0.9);
  --radius: 18px;
  --radius-sm: 10px;
  --green: #4ade80;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  line-height: 1.6;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 9999;
}

.glow-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(120px); }
.glow-orb.top { width: 700px; height: 500px; top: -200px; left: 50%; transform: translateX(-50%); background: radial-gradient(ellipse, rgba(255,255,255,0.04) 0%, transparent 70%); }
.glow-orb.mid { width: 400px; height: 400px; top: 40%; right: -100px; background: radial-gradient(ellipse, rgba(120,120,255,0.04) 0%, transparent 70%); }

/* ── NAV ── */
nav {
  position: fixed; width: 100%; top: 0;
  padding: 0 48px;
  height: 64px;
  display: flex; justify-content: space-between; align-items: center;
  background: var(--nav-bg);
  backdrop-filter: blur(20px) saturate(1.2);
  border-bottom: 1px solid var(--border);
  z-index: 1000;
}
.nav-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 18px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text); text-decoration: none;
}
nav ul { display: flex; gap: 36px; list-style: none; }
nav a { text-decoration: none; color: var(--muted); font-size: 13px; font-weight: 500; letter-spacing: 0.03em; transition: color .25s; }
nav a:hover, nav a.active { color: var(--text); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-cta {
  padding: 9px 22px; border-radius: 999px;
  background: #fff; color: #080808;
  font-size: 13px; font-weight: 600;
  text-decoration: none; letter-spacing: 0.02em;
  transition: opacity .2s, transform .2s;
}
.nav-cta:hover { opacity: 0.88; transform: translateY(-1px); }

/* ── PAGE LAYOUT ── */
.page-wrapper {
  display: flex;
  min-height: 100vh;
  padding-top: 64px;
  position: relative; z-index: 1;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 32px 0;
  position: sticky;
  top: 64px;
  height: calc(100vh - 64px);
  overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }
.sidebar-section { margin-bottom: 8px; }
.sidebar-heading {
  font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted2);
  padding: 0 24px; margin-bottom: 6px; margin-top: 20px;
  display: block;
}
.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 24px;
  font-size: 13px; color: var(--muted);
  cursor: pointer;
  transition: all .2s;
  border-left: 2px solid transparent;
  position: relative;
}
.sidebar-item:hover { color: var(--text); background: var(--surface2); }
.sidebar-item.active { color: var(--text); border-left-color: #fff; background: var(--surface2); }
.sidebar-item i { width: 14px; text-align: center; font-size: 12px; }
.sidebar-item .badge {
  margin-left: auto;
  background: var(--surface3);
  border: 1px solid var(--border);
  font-size: 10px; color: var(--muted);
  padding: 2px 7px; border-radius: 999px;
}
.sidebar-item.active .badge { background: rgba(255,255,255,0.1); color: var(--text); }

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1;
  padding: 40px 40px;
  min-width: 0;
}

/* ── TOP BAR ── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px; gap: 16px; flex-wrap: wrap;
}
.top-bar-left { display: flex; align-items: center; gap: 16px; }
.page-title {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800;
  letter-spacing: -0.02em;
}
.product-count {
  font-size: 12px; color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 999px;
}
.search-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  transition: border-color .2s;
  min-width: 240px;
}
.search-bar:focus-within { border-color: var(--border-bright); }
.search-bar i { color: var(--muted); font-size: 13px; }
.search-bar input {
  background: none; border: none; outline: none;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 13px; width: 100%;
}
.search-bar input::placeholder { color: var(--muted); }

/* ── VIEW TOGGLE ── */
.view-toggle {
  display: flex; gap: 2px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 3px;
}
.view-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 7px; cursor: pointer; color: var(--muted);
  transition: all .2s; font-size: 13px;
}
.view-btn.active { background: var(--surface2); color: var(--text); }
.view-btn:hover:not(.active) { color: var(--text); }

/* ── PRODUCTS GRID ── */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}
.products-grid.list-view {
  grid-template-columns: 1fr;
}

/* ── PRODUCT CARD ── */
.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all .25s ease;
  position: relative;
  animation: fadeUp 0.4s ease both;
}
.product-card:hover {
  border-color: var(--border-bright);
  transform: translateY(-4px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.product-img-wrap {
  aspect-ratio: 1;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  font-size: 52px;
}
.product-img-wrap .product-emoji {
  transition: transform .3s ease;
}
.product-card:hover .product-emoji { transform: scale(1.1); }

.product-badge {
  position: absolute; top: 12px; left: 12px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px; border-radius: 999px;
}
.badge-plus { background: #fff; color: #080808; }
.badge-free { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
.badge-new { background: rgba(147,112,219,0.2); color: #b89aff; border: 1px solid rgba(147,112,219,0.3); }

.product-info { padding: 18px; }
.product-name {
  font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 700;
  margin-bottom: 5px; letter-spacing: -0.01em;
}
.product-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
.product-footer {
  display: flex; align-items: center; justify-content: space-between;
}
.product-price {
  font-family: 'Syne', sans-serif;
  font-size: 16px; font-weight: 800;
  color: var(--text);
}
.product-price .currency { font-size: 11px; font-weight: 600; color: var(--muted); margin-right: 1px; }
.product-price .free-label { font-size: 14px; color: var(--green); }
.product-action {
  width: 32px; height: 32px;
  background: var(--surface2); border: 1px solid var(--border-bright);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--text);
  transition: all .2s;
}
.product-card:hover .product-action { background: #fff; color: #080808; border-color: #fff; }

/* ── LIST VIEW CARD ── */
.products-grid.list-view .product-card {
  display: flex; flex-direction: row;
}
.products-grid.list-view .product-img-wrap {
  width: 100px; flex-shrink: 0; aspect-ratio: auto; height: auto;
  font-size: 36px;
}
.products-grid.list-view .product-info {
  flex: 1; display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
.products-grid.list-view .product-desc { margin-bottom: 0; flex: 1; }
.products-grid.list-view .product-footer { flex-shrink: 0; gap: 16px; }

/* ── MODAL OVERLAY ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(12px);
  z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity .3s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border-bright);
  border-radius: 28px;
  width: 100%; max-width: 820px;
  max-height: 90vh; overflow-y: auto;
  transform: translateY(30px) scale(0.97);
  transition: transform .35s cubic-bezier(0.16,1,0.3,1);
  position: relative;
}
.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }
.modal-overlay.open .modal { transform: translateY(0) scale(1); }

.modal-close {
  position: absolute; top: 20px; right: 20px;
  width: 36px; height: 36px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; color: var(--muted);
  transition: all .2s; z-index: 10;
}
.modal-close:hover { color: var(--text); background: var(--surface3); }

.modal-header {
  display: flex; gap: 32px; padding: 40px 40px 32px;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.modal-img {
  width: 160px; height: 160px; flex-shrink: 0;
  background: var(--surface2); border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 72px; border: 1px solid var(--border);
}
.modal-meta { flex: 1; }
.modal-badge { display: inline-flex; margin-bottom: 14px; }
.modal-name {
  font-family: 'Syne', sans-serif;
  font-size: 32px; font-weight: 800;
  line-height: 1; letter-spacing: -0.03em;
  margin-bottom: 10px;
}
.modal-tagline { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
.modal-price-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.modal-price {
  font-family: 'Syne', sans-serif;
  font-size: 42px; font-weight: 800;
  letter-spacing: -0.04em;
}
.modal-price sup { font-size: 18px; font-weight: 600; color: var(--muted); }
.modal-price .free-big { color: var(--green); font-size: 36px; }
.modal-btn {
  padding: 13px 32px; border-radius: 999px;
  background: #fff; color: #080808;
  font-size: 14px; font-weight: 600;
  text-decoration: none; display: inline-flex; align-items: center; gap: 9px;
  transition: all .2s; border: none; cursor: pointer; letter-spacing: 0.01em;
}
.modal-btn:hover { opacity: 0.88; transform: translateY(-1px); }

.modal-body { padding: 32px 40px 40px; }
.modal-section-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 18px;
}

.modal-features-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 32px;
}
.modal-feature {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  font-size: 13px; color: var(--text);
}
.modal-feature i { color: var(--green); font-size: 12px; flex-shrink: 0; }

.modal-images-row {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 10px; margin-bottom: 32px;
}
.modal-preview-img {
  aspect-ratio: 16/10;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: var(--muted);
  cursor: pointer; transition: all .2s;
}
.modal-preview-img:hover { border-color: var(--border-bright); transform: scale(1.02); }

.modal-info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.modal-info-block {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px;
}
.modal-info-block .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.modal-info-block .value {
  font-family: 'Syne', sans-serif;
  font-size: 18px; font-weight: 800;
  color: var(--text);
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 80px 20px;
  color: var(--muted);
}
.empty-state i { font-size: 40px; margin-bottom: 16px; display: block; }
.empty-state p { font-size: 14px; }

/* ── CANVAS ── */
#particles-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  nav ul { display: none; }
  nav { padding: 0 20px; }
  .sidebar { display: none; }
  .main-content { padding: 24px 20px; }
  .modal-header { flex-direction: column; gap: 20px; padding: 28px; }
  .modal-img { width: 120px; height: 120px; font-size: 56px; }
  .modal-body { padding: 24px 28px 32px; }
  .modal-features-grid { grid-template-columns: 1fr; }
  .modal-info-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

      "Per-Moderator Filtering",
      "Timestamp Records",
      "Export Logs",
      "Searchable Database",
      "No Setup Required"
    ],
    previewEmojis: ["📊","🔎","📁"],
    previewLabels: ["Dashboard","Search","Export"],
    info: { version: "v1.2", tier: "Free", uptime: "24/7" }
  },
  {
    id: 4,
    name: "Anti-Exploit Pro",
    tagline: "Dedicated exploit detection engine. Catch cheaters before they ruin your game.",
    emoji: "🔐",
    badge: "new",
    price: 150,
    currency: "R$",
    tags: ["new","security","plus"],
    features: [
      "Speed Hack Detection",
      "Fly Hack Detection",
      "Teleport Abuse Flags",
      "Auto-Kick on Trigger",
      "Webhook Alert Support",
      "Customisable Thresholds"
    ],
    previewEmojis: ["⚠️","🚨","📡"],
    previewLabels: ["Alerts","Auto-Kick","Webhooks"],
    info: { version: "v1.0", tier: "Standalone", uptime: "24/7" }
  }
];

/* ── STATE ── */
let currentFilter = "all";
let currentView = "grid";
let searchQuery = "";

/* ── BADGE HTML ── */
function badgeHTML(b) {
  if(b === "plus") return `<span class="product-badge badge-plus">Plus+</span>`;
  if(b === "free") return `<span class="product-badge badge-free">Free</span>`;
  if(b === "new") return `<span class="product-badge badge-new">New</span>`;
  return "";
}

/* ── PRICE HTML ── */
function priceHTML(p, currency) {
  if(p === 0) return `<div class="product-price"><span class="free-label">Free</span></div>`;
  return `<div class="product-price"><span class="currency">${currency}</span>${p}</div>`;
}

/* ── RENDER CARDS ── */
function renderProducts() {
  const grid = document.getElementById("productsGrid");
  const empty = document.getElementById("emptyState");
  const filtered = products.filter(p => {
    const matchesFilter = currentFilter === "all" || p.tags.includes(currentFilter);
    const matchesSearch = p.name.toLowerCase().includes(searchQuery) || p.tagline.toLowerCase().includes(searchQuery);
    return matchesFilter && matchesSearch;
  });

  document.getElementById("product-count").textContent = `${filtered.length} product${filtered.length !== 1 ? "s" : ""}`;

  if(!filtered.length) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.className = "products-grid" + (currentView === "list" ? " list-view" : "");

  grid.innerHTML = filtered.map((p, i) => `
    <div class="product-card" onclick="openModal(${p.id})" style="animation-delay:${i*0.05}s">
      <div class="product-img-wrap">
        ${badgeHTML(p.badge)}
        <span class="product-emoji">${p.emoji}</span>
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.tagline}</div>
        <div class="product-footer">
          ${priceHTML(p.price, p.currency)}
          <div class="product-action"><i class="fa-solid fa-arrow-right"></i></div>
        </div>
      </div>
    </div>
  `).join("");
}

/* ── MODAL ── */
function openModal(id) {
  const p = products.find(x => x.id === id);
  if(!p) return;

  document.getElementById("modalImg").textContent = p.emoji;

  document.getElementById("modalBadge").innerHTML = (() => {
    if(p.badge === "plus") return `<span class="product-badge badge-plus" style="position:static;font-size:11px;">Plus+</span>`;
    if(p.badge === "free") return `<span class="product-badge badge-free" style="position:static;font-size:11px;">Free</span>`;
    if(p.badge === "new") return `<span class="product-badge badge-new" style="position:static;font-size:11px;">New</span>`;
    return "";
  })();

  document.getElementById("modalName").textContent = p.name;
  document.getElementById("modalTagline").textContent = p.tagline;

  if(p.price === 0) {
    document.getElementById("modalPrice").innerHTML = `<span class="free-big">Free</span>`;
  } else {
    document.getElementById("modalPrice").innerHTML = `<sup>${p.currency}</sup>${p.price}`;
  }

  document.getElementById("modalBtn").href = "https://discord.gg/2SmMSSkmmv";

  document.getElementById("modalFeatures").innerHTML = p.features.map(f =>
    `<div class="modal-feature"><i class="fa-solid fa-check"></i>${f}</div>`
  ).join("");

  document.getElementById("modalImages").innerHTML = p.previewEmojis.map((e, i) =>
    `<div class="modal-preview-img" title="${p.previewLabels[i]}">${e}<br><span style="font-size:11px;color:var(--muted);margin-top:6px;display:block;">${p.previewLabels[i]}</span></div>`
  ).join("");

  document.getElementById("modalInfoGrid").innerHTML = Object.entries(p.info).map(([k,v]) =>
    `<div class="modal-info-block"><div class="label">${k}</div><div class="value">${v}</div></div>`
  ).join("");

  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("modalOverlay").addEventListener("click", e => {
  if(e.target === document.getElementById("modalOverlay")) closeModal();
});
document.addEventListener("keydown", e => { if(e.key === "Escape") closeModal(); });

/* ── SIDEBAR FILTERS ── */
document.querySelectorAll(".sidebar-item[data-filter]").forEach(item => {
  item.addEventListener("click", () => {
    document.querySelectorAll(".sidebar-item").forEach(s => s.classList.remove("active"));
    item.classList.add("active");
    currentFilter = item.dataset.filter;
    renderProducts();
  });
});

/* ── SEARCH ── */
document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value.toLowerCase();
  renderProducts();
});

/* ── VIEW TOGGLE ── */
document.getElementById("gridViewBtn").addEventListener("click", () => {
  currentView = "grid";
  document.getElementById("gridViewBtn").classList.add("active");
  document.getElementById("listViewBtn").classList.remove("active");
  renderProducts();
});
document.getElementById("listViewBtn").addEventListener("click", () => {
  currentView = "list";
  document.getElementById("listViewBtn").classList.add("active");
  document.getElementById("gridViewBtn").classList.remove("active");
  renderProducts();
});

/* ── INIT ── */
renderProducts();

/* ── PARTICLES ── */
const canvas = document.getElementById("particles-bg");
const ctx = canvas.getContext("2d");
let particles = [];
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); addEventListener("resize", resize);
class P {
  constructor() { this.reset(); }
  reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.r = Math.random() * 1.2 + 0.3; this.dx = (Math.random() - 0.5) * 0.3; this.dy = (Math.random() - 0.5) * 0.3; this.a = Math.random() * 0.5 + 0.1; }
  draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,255,255,${this.a})`; ctx.fill(); }
  update() { this.x += this.dx; this.y += this.dy; if(this.x < 0 || this.x > canvas.width) this.dx *= -1; if(this.y < 0 || this.y > canvas.height) this.dy *= -1; this.draw(); }
}
for(let i = 0; i < 60; i++) particles.push(new P());
function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => p.update()); requestAnimationFrame(animate); }
animate();
</script>
</body>
</html>
