<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Luxor • Team</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap"
rel="stylesheet"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0d0d10;
  --text:#ececf1;
  --muted:#8a8a95;
  --muted2:#5e5e68;
  --border:#232329;
}

body{
  font-family:'Geist',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ===== CLEAN BANNER BACKGROUND ===== */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:blur(40px) brightness(.25);
  transform:scale(1.1);
  z-index:-1;
}

/* PAGE */
.page{
  max-width:1100px;
  margin:auto;
  padding:40px 24px 80px;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  margin-bottom:60px;
}

.nav-links{
  display:flex;
  gap:24px;
  list-style:none;
}

.nav-links a{
  font-size:13px;
  color:var(--muted);
  text-decoration:none;
}

/* HERO */
.hero{
  margin-bottom:40px;
}

.hero h1{
  font-size:54px;
  letter-spacing:-2px;
}

/* CARD */
.team-card{
  background:rgba(21,21,25,.65);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  backdrop-filter:blur(14px);
}

/* HEADER */
.team-top{
  display:flex;
  align-items:center;
  gap:14px;
}

.avatar{
  width:60px;
  height:60px;
  border-radius:16px;
  border:1px solid var(--border);
  object-fit:cover;
}

/* NAME */
.member-name{
  font-size:18px;
  font-weight:600;
}

/* STATUS */
.status-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:6px;
}

.dot{
  width:9px;
  height:9px;
  border-radius:50%;
}

.online{background:#43b581;}
.idle{background:#faa61a;}
.dnd{background:#ed4245;}
.offline{background:#747f8d;}

/* CARDS */
.card{
  margin-top:14px;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#111115;
  display:flex;
  gap:12px;
  align-items:center;
}

/* ACTIVITY IMAGE */
.activity-image{
  width:100%;
  margin-top:10px;
  border-radius:14px;
  border:1px solid var(--border);
}

/* DEVICES */
.devices{
  margin-top:10px;
  font-size:12px;
  color:var(--muted2);
}

/* SOCIALS */
.socials{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.socials a{
  width:36px;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:#111115;
  border:1px solid var(--border);
  color:var(--muted);
  text-decoration:none;
}

/* LOADING */
.skeleton{
  background:linear-gradient(90deg,#1a1a1f,#232329,#1a1a1f);
  background-size:200% 100%;
  animation:shimmer 1.2s infinite;
  border-radius:6px;
}

@keyframes shimmer{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

.line{
  height:12px;
  width:60%;
  margin-top:6px;
}

</style>
</head>

<body>

<div class="page">

<nav>
<ul class="nav-links">
  <li><a href="index.html">Home</a></li>
  <li><a href="PrivacyPol.html">Privacy</a></li>
  <li><a href="ToS.html">Terms</a></li>
</ul>
</nav>

<section class="hero">
<h1>Built by developers focused on quality.</h1>
</section>

<div class="team-card">

<!-- HEADER -->
<div class="team-top">

  <img id="avatar" class="avatar skeleton"/>

  <div>

    <div id="username" class="skeleton line"></div>

    <div class="status-row">
      <div id="status-dot" class="dot offline"></div>
      <div id="status" class="skeleton line" style="width:40%"></div>
    </div>

  </div>

</div>

<!-- SPOTIFY -->
<div id="spotify-card" class="card" style="display:none;">
<i class="fa-brands fa-spotify" style="color:#1DB954"></i>
<div>
  <div id="spotify-song"></div>
  <div id="spotify-artist"></div>
</div>
</div>

<!-- ACTIVITY -->
<div id="activity-card" class="card" style="display:none;">
<i class="fa-solid fa-gamepad"></i>
<div>
  <div id="activity-name"></div>
  <div id="activity-type"></div>
  <div id="activity-time"></div>
</div>
</div>

<img id="activity-image" class="activity-image" style="display:none"/>

<div id="devices" class="devices"></div>

<!-- SOCIALS -->
<div class="socials">

<a href="https://discord.gg/2SmMSSkmmv"><i class="fa-brands fa-discord"></i></a>

<a href="https://fjfg11.github.io/"><i class="fa-solid fa-earth-americas"></i></a>

<a href="https://www.roblox.com/users/421517931/profile"><i class="fa-solid fa-gamepad"></i></a>

<a href="https://github.com/FJFG11"><i class="fa-brands fa-github"></i></a>

</div>

</div>

</div>

<script>

const USER_ID = "1193285201783181361";
let timer;

const socket = new WebSocket("wss://api.lanyard.rest/socket");

socket.onopen = () => {
  socket.send(JSON.stringify({
    op:2,
    d:{ subscribe_to_id: USER_ID }
  }));
};

socket.onmessage = (msg) => {

  const res = JSON.parse(msg.data);
  if(!res.d) return;

  const d = res.d;

  /* remove skeleton */
  document.querySelectorAll(".skeleton")
    .forEach(el => el.remove());

  /* user */
  document.getElementById("username").textContent =
    d.discord_user.global_name || d.discord_user.username;

  document.getElementById("avatar").src =
    `https://cdn.discordapp.com/avatars/${USER_ID}/${d.discord_user.avatar}.png`;

  /* banner background */
  if(d.discord_user.banner){
    const url =
      `https://cdn.discordapp.com/banners/${USER_ID}/${d.discord_user.banner}.png?size=1024`;

    document.body.style.backgroundImage = `url(${url})`;
  }

  /* status */
  const dot=document.getElementById("status-dot");
  const status=document.getElementById("status");

  dot.className="dot";

  if(d.discord_status==="online"){
    dot.classList.add("online");
    status.textContent="Online";
  } else if(d.discord_status==="idle"){
    dot.classList.add("idle");
    status.textContent="Idle";
  } else if(d.discord_status==="dnd"){
    dot.classList.add("dnd");
    status.textContent="Do Not Disturb";
  } else {
    dot.classList.add("offline");
    status.textContent="Offline";
  }

  /* devices */
  const dev=[];
  if(d.active_on_discord_desktop) dev.push("Desktop");
  if(d.active_on_discord_mobile) dev.push("Mobile");
  if(d.active_on_discord_web) dev.push("Web");

  document.getElementById("devices").textContent =
    dev.join(" • ");

  /* spotify */
  const sp=document.getElementById("spotify-card");

  if(d.listening_to_spotify){
    sp.style.display="flex";
    document.getElementById("spotify-song").textContent=d.spotify.song;
    document.getElementById("spotify-artist").textContent=d.spotify.artist;
  } else {
    sp.style.display="none";
  }

  /* activity */
  const a=d.activities?.find(x=>x.type===0&&x.name!=="Spotify");

  const card=document.getElementById("activity-card");
  const img=document.getElementById("activity-image");

  if(a){

    card.style.display="flex";

    document.getElementById("activity-name").textContent=a.name;
    document.getElementById("activity-type").textContent=a.details||"Active";

    if(a.timestamps?.start){
      clearInterval(timer);
      timer=setInterval(()=>{
        const diff=Date.now()-a.timestamps.start;
        const h=Math.floor(diff/3600000);
        const m=Math.floor((diff%3600000)/60000);
        const s=Math.floor((diff%60000)/1000);
        document.getElementById("activity-time").textContent=
          `${h}h ${m}m ${s}s`;
      },1000);
    }

    if(a.assets?.large_image){
      img.style.display="block";
      img.src=
        `https://cdn.discordapp.com/app-assets/${a.application_id}/${a.assets.large_image}.png`;
    }

  } else {
    card.style.display="none";
    img.style.display="none";
  }

};

</script>

</body>
</html>
