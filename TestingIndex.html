<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Luxor • Team</title>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"/>

<style>

*, *::before, *::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0d0d10;
  --text:#ececf1;
  --muted:#8a8a95;
  --muted2:#5e5e68;
  --card:#151519;
  --border:#232329;
  --hover:#1b1b20;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Geist',sans-serif;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left,#2a2a35 0%,transparent 40%);
  opacity:.2;
  pointer-events:none;
}

a{
  color:inherit;
  text-decoration:none;
}

.page{
  max-width:1100px;
  margin:auto;
  padding:40px 24px 100px;
}

nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:100px;
}

.nav-links{
  display:flex;
  gap:28px;
  list-style:none;
}

.nav-links a{
  font-size:13px;
  color:var(--muted);
  transition:.15s;
}

.nav-links a:hover{
  color:var(--text);
}

.hero{
  margin-bottom:100px;
}

.hero-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:7px 12px;
  border-radius:999px;
  background:var(--card);
  border:1px solid var(--border);
  color:var(--muted);
  font-size:12px;
  margin-bottom:22px;
}

.hero h1{
  font-size:64px;
  line-height:1;
  letter-spacing:-3px;
  margin-bottom:24px;
}

.hero p{
  color:var(--muted);
  font-size:15px;
  line-height:1.9;
  max-width:700px;
}

.section{
  margin-bottom:100px;
}

.section-sub{
  font-size:12px;
  color:var(--muted2);
  text-transform:uppercase;
  letter-spacing:.14em;
  margin-bottom:12px;
}

.section-title{
  font-size:38px;
  letter-spacing:-1px;
  margin-bottom:40px;
}

.team-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

.team-card{
  background:rgba(21,21,25,.75);
  backdrop-filter:blur(10px);
  border:1px solid var(--border);
  border-radius:24px;
  padding:26px;
  transition:.2s;
}

.team-card:hover{
  transform:translateY(-4px);
  background:var(--hover);
}

.team-top{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:22px;
}

.lanyard-avatar{
  width:58px;
  height:58px;
  border-radius:18px;
  border:1px solid var(--border);
  object-fit:cover;
  background:#111115;
}

.member-name{
  font-size:18px;
  font-weight:600;
  margin-bottom:4px;
}

.member-role{
  color:var(--muted2);
  font-size:13px;
}

.status-wrapper{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:8px;
}

.status-dot{
  width:10px;
  height:10px;
  border-radius:999px;
  position:relative;
}

.status-dot::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:999px;
  animation:pulse 2s infinite;
  opacity:.6;
}

.online{background:#43b581;}
.idle{background:#faa61a;}
.dnd{background:#ed4245;}
.offline{background:#747f8d;}

@keyframes pulse{
  0%{transform:scale(1);opacity:.7;}
  70%{transform:scale(2.2);opacity:0;}
  100%{transform:scale(1);opacity:0;}
}

.member-status{
  font-size:12px;
  color:var(--muted2);
}

.spotify-card,
.activity-card{
  margin-top:20px;
  padding:14px;
  border-radius:18px;
  border:1px solid var(--border);
  background:#111115;
  display:flex;
  align-items:center;
  gap:14px;
}

.spotify-card i,
.activity-card i{
  font-size:26px;
  color:#1DB954;
}

.spotify-text{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.spotify-song{
  font-size:14px;
  font-weight:600;
}

.spotify-artist{
  font-size:12px;
  color:var(--muted2);
}

.activity-image{
  width:100%;
  margin-top:14px;
  border-radius:16px;
  border:1px solid var(--border);
}

.devices{
  margin-top:12px;
  font-size:12px;
  color:var(--muted2);
}

.footer{
  border-top:1px solid var(--border);
  padding-top:28px;
  color:var(--muted2);
  font-size:13px;
  display:flex;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
}

.socials{
  display:flex;
  gap:14px;
}

.socials a:hover{color:var(--text);}

</style>
</head>

<body>

<div class="page">

<nav>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="PrivacyPol.html">Privacy Policy</a></li>
    <li><a href="ToS.html">Terms Of Service</a></li>
  </ul>
</nav>

<section class="hero">

  <div class="hero-badge">
    <i class="fa-solid fa-users"></i>
    The Developers
  </div>

  <h1>Built by developers focused on quality.</h1>

  <p>
    Luxor is maintained by a small team of 1 person focused on creating modern e-commerce assets for the market!
  </p>

</section>

<section class="section">

  <div class="team-grid">

    <div class="team-card">

      <div class="team-top">

        <img id="avatar" class="lanyard-avatar"
        src="https://cdn.discordapp.com/embed/avatars/0.png"/>

        <div>

          <div class="member-name" id="username">Loading...</div>

          <div class="member-role">Founder + Lead Developer</div>

          <div class="status-wrapper">
            <div class="status-dot offline" id="status-dot"></div>
            <div class="member-status" id="status">Loading...</div>
          </div>

        </div>

      </div>

      <div class="spotify-card" id="spotify-card" style="display:none;">
        <i class="fa-brands fa-spotify"></i>
        <div class="spotify-text">
          <div class="spotify-song" id="spotify-song"></div>
          <div class="spotify-artist" id="spotify-artist"></div>
        </div>
      </div>

      <div class="activity-card" id="activity-card" style="display:none;">
        <i class="fa-solid fa-gamepad"></i>
        <div class="spotify-text">
          <div class="spotify-song" id="activity-name"></div>
          <div class="spotify-artist" id="activity-type"></div>
          <div class="spotify-artist" id="activity-time"></div>
        </div>
      </div>

      <img id="activity-image" class="activity-image" style="display:none"/>

      <div class="devices" id="devices"></div>

    </div>

  </div>

</section>

</div>

<script>

const USER_ID = "1193285201783181361";

let timer;

const socket = new WebSocket("wss://api.lanyard.rest/socket");

socket.onopen = () => {
  socket.send(JSON.stringify({
    op: 2,
    d: { subscribe_to_id: USER_ID }
  }));
};

socket.onmessage = (msg) => {

  const data = JSON.parse(msg.data);

  if(!data || !data.d) return;

  const d = data.d;

  document.getElementById("username").textContent =
    d.discord_user.global_name || d.discord_user.username;

  document.getElementById("avatar").src =
    `https://cdn.discordapp.com/avatars/${USER_ID}/${d.discord_user.avatar}.png`;

  const dot = document.getElementById("status-dot");
  const status = document.getElementById("status");

  dot.className = "status-dot";

  if(d.discord_status === "online"){
    dot.classList.add("online");
    status.textContent = "Online";
  } else if(d.discord_status === "idle"){
    dot.classList.add("idle");
    status.textContent = "Idle";
  } else if(d.discord_status === "dnd"){
    dot.classList.add("dnd");
    status.textContent = "Do Not Disturb";
  } else {
    dot.classList.add("offline");
    status.textContent = "Offline";
  }

  const devices = [];
  if(d.active_on_discord_desktop) devices.push("🖥 Desktop");
  if(d.active_on_discord_mobile) devices.push("📱 Mobile");
  if(d.active_on_discord_web) devices.push("🌐 Web");

  document.getElementById("devices").textContent =
    devices.join(" • ") || "No active devices";

  const spotify = document.getElementById("spotify-card");

  if(d.listening_to_spotify){
    spotify.style.display = "flex";
    document.getElementById("spotify-song").textContent = d.spotify.song;
    document.getElementById("spotify-artist").textContent = d.spotify.artist;
  } else {
    spotify.style.display = "none";
  }

  const activity = d.activities?.find(a => a.type === 0 && a.name !== "Spotify");

  const card = document.getElementById("activity-card");
  const img = document.getElementById("activity-image");

  if(activity){

    card.style.display = "flex";

    document.getElementById("activity-name").textContent = activity.name;
    document.getElementById("activity-type").textContent =
      activity.details || "Active";

    if(activity.timestamps?.start){

      clearInterval(timer);

      timer = setInterval(() => {

        const diff = Date.now() - activity.timestamps.start;

        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        document.getElementById("activity-time").textContent =
          `${h}h ${m}m ${s}s`;

      }, 1000);
    }

    if(activity.assets?.large_image){
      img.style.display = "block";
      img.src =
        `https://cdn.discordapp.com/app-assets/${activity.application_id}/${activity.assets.large_image}.png`;
    }

  } else {
    card.style.display = "none";
    img.style.display = "none";
  }

};

</script>

</body>
</html>
