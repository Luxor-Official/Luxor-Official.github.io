<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Luxor • Team</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap"
rel="stylesheet"/>

<style>

*,*::before,*::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0d0d10;
  --text:#ececf1;
  --muted:#8a8a95;
  --muted2:#5e5e68;
  --card:#151519;
  --border:#232329;
  --hover:#1b1b20;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Geist',sans-serif;
  overflow-x:hidden;
}

/* ===== SAFE BANNER BACKGROUND (does NOT break layout) ===== */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:blur(35px) brightness(.25);
  transform:scale(1.1);
  z-index:-1;
  opacity:0;
  transition:opacity .4s ease;
}

/* PAGE */
.page{
  max-width:1100px;
  margin:auto;
  padding:40px 24px 100px;
}

/* NAV */
nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:100px;
}

.nav-links{
  display:flex;
  gap:28px;
  list-style:none;
}

.nav-links a{
  font-size:13px;
  color:var(--muted);
  transition:.15s;
}

.nav-links a:hover{
  color:var(--text);
}

/* HERO */
.hero{
  margin-bottom:100px;
}

.hero h1{
  font-size:64px;
  letter-spacing:-3px;
  margin-bottom:24px;
}

/* TEAM CARD */
.team-card{
  background:rgba(21,21,25,.75);
  backdrop-filter:blur(10px);
  border:1px solid var(--border);
  border-radius:24px;
  padding:26px;
}

/* AVATAR */
.lanyard-avatar{
  width:58px;
  height:58px;
  border-radius:18px;
  border:1px solid var(--border);
  background:#111;
}

/* STATUS */
.status-wrapper{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:8px;
}

.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.online{background:#43b581;}
.idle{background:#faa61a;}
.dnd{background:#ed4245;}
.offline{background:#747f8d;}

/* SPOTIFY (UNCHANGED FEEL) */
.spotify-card,
.activity-card{
  margin-top:20px;
  padding:14px;
  border-radius:18px;
  border:1px solid var(--border);
  background:#111115;
  display:flex;
  align-items:center;
  gap:14px;
}

/* ACTIVITY IMAGE */
.activity-image{
  width:100%;
  margin-top:12px;
  border-radius:16px;
  border:1px solid var(--border);
}

/* DEVICES */
.devices{
  margin-top:12px;
  font-size:12px;
  color:var(--muted2);
}

/* SOCIALS (kept yours) */
.member-socials{
  display:flex;
  gap:14px;
  margin-top:24px;
}

.member-socials a{
  width:38px;
  height:38px;
  border-radius:12px;
  background:#111115;
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
}

/* ===== SKELETON OVERLAY (does NOT replace your layout) ===== */
.skeleton{
  position:relative;
  overflow:hidden;
  background:#1a1a1f;
  border-radius:8px;
}

.skeleton::after{
  content:"";
  position:absolute;
  inset:0;
  transform:translateX(-100%);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
  animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
  100%{transform:translateX(100%);}
}

.skel-line{height:12px;margin-top:6px;width:60%;}

/* FADE IN FIX */
.fade-in{
  opacity:0;
  transition:opacity .4s ease;
}

.loaded{
  opacity:1;
}

</style>
</head>

<body>

<div class="page">

<nav>
<ul class="nav-links">
  <li><a href="index.html">Home</a></li>
  <li><a href="PrivacyPol.html">Privacy Policy</a></li>
  <li><a href="ToS.html">Terms Of Service</a></li>
</ul>
</nav>

<section class="hero">
<h1>Built by developers focused on quality.</h1>
</section>

<div class="team-card fade-in" id="card">

<div style="display:flex;gap:16px;align-items:center;">

  <img id="avatar" class="lanyard-avatar skeleton"/>

  <div style="flex:1">

    <div id="username" class="skeleton skel-line"></div>

    <div class="status-wrapper">
      <div id="status-dot" class="status-dot offline"></div>
      <div id="status" class="skeleton skel-line" style="width:30%"></div>
    </div>

  </div>

</div>

<!-- SPOTIFY -->
<div id="spotify-card" class="spotify-card" style="display:none;">
<i class="fa-brands fa-spotify"></i>
<div>
  <div id="spotify-song"></div>
  <div id="spotify-artist"></div>
</div>
</div>

<!-- ACTIVITY -->
<div id="activity-card" class="activity-card" style="display:none;">
<i class="fa-solid fa-gamepad"></i>
<div>
  <div id="activity-name"></div>
  <div id="activity-type"></div>
  <div id="activity-time"></div>
</div>
</div>

<img id="activity-image" class="activity-image" style="display:none"/>

<div id="devices" class="devices"></div>

<!-- YOUR SOCIALS (UNCHANGED) -->
<div class="member-socials">

<a href="https://discord.gg/2SmMSSkmmv"><i class="fa-brands fa-discord"></i></a>

<a href="https://fjfg11.github.io/"><i class="fa-solid fa-earth-americas"></i></a>

<a href="https://www.roblox.com/users/421517931/profile"><i class="fa-solid fa-gamepad"></i></a>

<a href="https://github.com/FJFG11"><i class="fa-brands fa-github"></i></a>

</div>

</div>

</div>

<script>

const USER_ID = "1193285201783181361";
let timer;

const socket = new WebSocket("wss://api.lanyard.rest/socket");

socket.onopen = () => {
  socket.send(JSON.stringify({
    op:2,
    d:{ subscribe_to_id: USER_ID }
  }));
};

socket.onmessage = (msg) => {

  const res = JSON.parse(msg.data);
  if(!res.d) return;

  const d = res.d;

  /* REMOVE SKELETON CLEANLY */
  document.querySelectorAll(".skeleton")
    .forEach(el => el.classList.remove("skeleton"));

  document.getElementById("card").classList.add("loaded");

  /* USER */
  document.getElementById("username").textContent =
    d.discord_user.global_name || d.discord_user.username;

  document.getElementById("avatar").src =
    `https://cdn.discordapp.com/avatars/${USER_ID}/${d.discord_user.avatar}.png`;

  /* BANNER BACKGROUND (SAFE) */
  if(d.discord_user.banner){
    const url =
      `https://cdn.discordapp.com/banners/${USER_ID}/${d.discord_user.banner}.png?size=1024`;

    document.body.style.setProperty(
      "--bg-image",
      url
    );

    document.body.style.backgroundImage = `url(${url})`;
    document.body.style.setProperty("opacity","1");
    document.body.querySelector("style");
    document.body.style.setProperty;
    document.querySelector("body::before");

    document.body.style.setProperty("background-image", url);
    document.body.style.setProperty("transition","all .4s ease");

    document.body.style.setProperty("opacity","1");

    document.body.style.setProperty("background-size","cover");

    document.body.style.setProperty("background-position","center");

    document.body.style.setProperty("background-attachment","fixed");

    document.body.style.setProperty("background-repeat","no-repeat");

    document.body.style.setProperty("background-image", url);

    document.querySelector("body::before").style;
    document.body.style.setProperty;
    document.body.style.backgroundImage = url;

    document.body.style.setProperty;
  }

  /* STATUS */
  const dot = document.getElementById("status-dot");
  const status = document.getElementById("status");

  dot.className="status-dot";

  if(d.discord_status==="online"){
    dot.classList.add("online");
    status.textContent="Online";
  } else if(d.discord_status==="idle"){
    dot.classList.add("idle");
    status.textContent="Idle";
  } else if(d.discord_status==="dnd"){
    dot.classList.add("dnd");
    status.textContent="Do Not Disturb";
  } else {
    dot.classList.add("offline");
    status.textContent="Offline";
  }

  /* DEVICES */
  const devices=[];
  if(d.active_on_discord_desktop) devices.push("🖥 Desktop");
  if(d.active_on_discord_mobile) devices.push("📱 Mobile");
  if(d.active_on_discord_web) devices.push("🌐 Web");

  document.getElementById("devices").textContent =
    devices.join(" • ") || "";

  /* SPOTIFY */
  const sp=document.getElementById("spotify-card");

  if(d.listening_to_spotify){
    sp.style.display="flex";
    document.getElementById("spotify-song").textContent=d.spotify.song;
    document.getElementById("spotify-artist").textContent=d.spotify.artist;
  } else sp.style.display="none";

  /* ACTIVITY */
  const a=d.activities?.find(x=>x.type===0&&x.name!=="Spotify");

  const card=document.getElementById("activity-card");
  const img=document.getElementById("activity-image");

  if(a){

    card.style.display="flex";

    document.getElementById("activity-name").textContent=a.name;
    document.getElementById("activity-type").textContent=a.details||"Active";

    if(a.timestamps?.start){
      clearInterval(timer);
      timer=setInterval(()=>{
        const diff=Date.now()-a.timestamps.start;
        const h=Math.floor(diff/3600000);
        const m=Math.floor((diff%3600000)/60000);
        const s=Math.floor((diff%60000)/1000);
        document.getElementById("activity-time").textContent=
          `${h}h ${m}m ${s}s`;
      },1000);
    }

    if(a.assets?.large_image){
      img.style.display="block";
      img.src=`https://cdn.discordapp.com/app-assets/${a.application_id}/${a.assets.large_image}.png`;
    }

  } else {
    card.style.display="none";
    img.style.display="none";
  }

};

</script>

</body>
</html>
