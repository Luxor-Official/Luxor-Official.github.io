<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 • Luxor</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #050507;
  --surface: #0d0d12;
  --border: rgba(255,255,255,0.06);
  --border-bright: rgba(255,255,255,0.12);
  --text: #efefef;
  --muted: #5a5a6e;
  --accent: #7c6dfa;
  --accent2: #a78bfa;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Manrope', sans-serif;
  overflow: hidden;
}

/* Background mesh (same feel) */
.bg {
  position: fixed;
  inset: 0;
  overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
}
.orb.a {
  width: 500px; height: 500px;
  background: rgba(124,109,250,0.08);
  top: -150px; left: 50%;
  transform: translateX(-50%);
}
.orb.b {
  width: 300px; height: 300px;
  background: rgba(167,139,250,0.06);
  bottom: 0; right: -100px;
}

/* Center content */
.wrap {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.content {
  max-width: 520px;
}

/* Big 404 */
.code {
  font-family: 'Unbounded', sans-serif;
  font-size: clamp(80px, 18vw, 180px);
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: -0.05em;
  background: linear-gradient(135deg, #fff, #7c6dfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Title */
h1 {
  font-family: 'Unbounded', sans-serif;
  font-size: 28px;
  margin: 20px 0 10px;
}

/* Subtext */
p {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 30px;
}

/* Buttons */
.btns {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  padding: 12px 24px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  transition: .25s;
}

.primary {
  background: var(--accent);
  color: #fff;
}
.primary:hover {
  background: var(--accent2);
  transform: translateY(-2px);
}

.ghost {
  border: 1px solid var(--border-bright);
  color: var(--text);
}
.ghost:hover {
  background: var(--surface);
  transform: translateY(-2px);
}
</style>
</head>
<body>

<div class="bg">
  <div class="orb a"></div>
  <div class="orb b"></div>
</div>

<div class="wrap">
  <div class="content">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn’t exist or has been moved.</p>

    <div class="btns">
      <a href="https://luxor.efewfwfwfwfwfwefewf.workers.dev/indexV2" class="btn primary">Go Home</a>
    </div>
  </div>
</div>

</body>
</html>
